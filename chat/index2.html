<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Школа №76 Иркутск] - Подпольный Чат</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        h3 { text-align: center; margin-bottom: 10px; font-size: 16px; letter-spacing: 2px; text-shadow: 0 0 5px #00ff00; }
        #chat { flex: 1; border: 1px solid #00ff00; background: #050505; padding: 15px; overflow-y: auto; margin-bottom: 15px; border-radius: 4px; box-shadow: inset 0 0 10px #003300; }
        .msg-line { margin-bottom: 8px; line-height: 1.4; font-size: 14px; word-break: break-all; }
        .system { color: #888; font-style: italic; }
        .controls { display: flex; gap: 10px; }
        input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 12px; font-family: inherit; font-size: 14px; border-radius: 4px; outline: none; }
        input:focus { box-shadow: 0 0 5px #00ff00; }
        #nick { width: 80px; text-align: center; }
        #msg { flex: 1; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 20px; font-family: inherit; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #003300; color: #006600; cursor: not-allowed; }
    </style>
</head>
<body>

    <h3>[ ОБЩИЙ ПОДПОЛЬНЫЙ КАНАЛ ШКОЛЫ №76 ]</h3>
    <div id="chat"></div>
    
    <div class="controls">
        <input id="nick" type="text" value="Анон" maxlength="8">
        <input id="msg" type="text" placeholder="Подключение к шине данных..." disabled autocomplete="off" maxlength="200">
        <button id="send-btn" disabled onclick="send()">ЖДИ...</button>
    </div>

    <!-- ТОЧНАЯ ПРЯМАЯ ССЫЛКА НА БИБЛИОТЕКУ, КОТОРАЯ СРАБОТАЕТ НА GITHUB PAGES -->
    <script src="pubnub.com"></script>

    <script>
        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        const nickInput = document.getElementById('nick');
        const sendBtn = document.getElementById('send-btn');

        let isCooldown = false;
        chat.innerHTML = '<div class="msg-line system">Вход в защищенную глобальную сеть...</div>';

        // Открытые демо-ключи, работают прямо из коробки на любом домене
        const pubnub = new PubNub({
            publishKey: 'pub-c-8a2bfb6a-939e-4ff6-9db8-0ffbc90ffbf5',
            subscribeKey: 'sub-c-5e4835ea-d963-11eb-a029-2a3b0ff97c23',
            userId: "user_" + Math.random().toString(36).substring(2, 9)
        });

        // Название комнаты твоего домена
        const channelName = "school_76_irkutsk_global_chat";

        pubnub.subscribe({
            channels: [channelName]
        });

        pubnub.addListener({
            status: function(statusEvent) {
                if (statusEvent.category === "PNConnectedCategory") {
                    const loader = chat.querySelector('.system');
                    if (loader) loader.remove();
                    chat.innerHTML += '<div class="msg-line system" style="color:#00ff00">> ШЛЮЗ ОТКРЫТ. Сеть глобальна и готова к работе.</div>';
                    msgInput.placeholder = "Пиши сюда...";
                    msgInput.disabled = false;
                    sendBtn.disabled = false;
                    sendBtn.innerText = "ОТПРАВИТЬ";
                }
            },
            message: function(messageEvent) {
                const data = messageEvent.message;
                
                // Вайп по воскресеньям у всех
                if (data.isWipeAction) {
                    chat.innerHTML = '<div class="msg-line system">История чата очищена по воскресному расписанию.</div>';
                    return;
                }

                renderMessage(data.name, data.text);
            }
        });

        function renderMessage(name, text) {
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.innerHTML = `<b>[${name}]:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Защита от спама на 5 секунд
        function startCooldown() {
            isCooldown = true;
            sendBtn.disabled = true;
            let timeLeft = 5.0;

            const timer = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    sendBtn.disabled = false;
                    sendBtn.innerText = "ОТПРАВИТЬ";
                    msgInput.placeholder = "Пиши сюда...";
                    isCooldown = false;
                } else {
                    sendBtn.innerText = `[${timeLeft.toFixed(1)}s]`;
                    msgInput.placeholder = "Защита от спама...";
                }
            }, 100);
        }

        function send() {
            if (isCooldown) return;

            const text = msgInput.value.trim();
            const name = nickInput.value.trim() || 'Анон';
            const now = new Date();

            // Авто-чистка по воскресеньям (0 — воскресенье)
            if (now.getDay() === 0) {
                startCooldown();
                pubnub.publish({
                    channel: channelName,
                    message: { isWipeAction: true }
                });
                msgInput.value = '';
                return;
            }
            
            if (text !== '') {
                startCooldown();
                pubnub.publish({
                    channel: channelName,
                    message: { name: name, text: text }
                });
                msgInput.value = '';
            }
        }

        msgInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter' && !isCooldown) send(); 
        });
    </script>
</body>
</html>
