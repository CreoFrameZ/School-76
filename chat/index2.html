<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mesh Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        h3 { text-align: center; margin-bottom: 10px; font-size: 16px; letter-spacing: 2px; text-shadow: 0 0 5px #00ff00; }
        #chat { flex: 1; border: 1px solid #00ff00; background: #050505; padding: 15px; overflow-y: auto; margin-bottom: 15px; border-radius: 4px; box-shadow: inset 0 0 10px #003300; }
        .msg-line { margin-bottom: 8px; line-height: 1.4; font-size: 14px; word-break: break-all; }
        .system { color: #888; font-style: italic; }
        .controls { display: flex; gap: 10px; }
        input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 12px; font-family: inherit; font-size: 14px; border-radius: 4px; outline: none; }
        input:focus { box-shadow: 0 0 5px #00ff00; }
        #nick { width: 80px; text-align: center; }
        #msg { flex: 1; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 20px; font-family: inherit; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #003300; color: #006600; cursor: not-allowed; }
    </style>
</head>
<body>

    <h3>[ ГЛОБАЛЬНЫЙ ПОДПОЛЬНЫЙ ЧАТ ШКОЛЫ №76 ]</h3>
    <div id="chat"></div>
    
    <div class="controls">
        <input id="nick" type="text" value="Анон" maxlength="8">
        <input id="msg" type="text" placeholder="Подключение к сети..." disabled autocomplete="off" maxlength="200">
        <button id="send-btn" disabled onclick="send()">ЖДИ...</button>
    </div>

    <!-- Загрузка полноценного сетевого скрипта Firebase -->
    <script src="gstatic.com"></script>
    <script src="gstatic.com"></script>

    <script>
        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        const nickInput = document.getElementById('nick');
        const sendBtn = document.getElementById('send-btn');

        let isCooldown = false;

        chat.innerHTML = '<div class="msg-line system">Авторизация на защищенном шлюзе...</div>';

        // Глобальный публичный тестовый сервер
        const firebaseConfig = {
            databaseURL: "firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages_76');

        // Разблокировка интерфейса при коннекте
        db.once('value').then(() => {
            const loader = chat.querySelector('.system');
            if (loader) loader.remove();
            msgInput.placeholder = "Пиши сюда...";
            msgInput.disabled = false;
            sendBtn.disabled = false;
            sendBtn.innerText = "ОТПРАВИТЬ";
        }).catch(err => {
            chat.innerHTML += `<div class="msg-line" style="color:red">Ошибка шлюза: ${err.message}</div>`;
        });

        // Безопасная функция очистки истории по воскресеньям
        function checkAndWipeOldMessages(snapshot) {
            const now = new Date();
            if (now.getDay() === 0) { // 0 — это воскресенье
                const data = snapshot.val();
                if (data && data.timestamp) {
                    const msgDate = new Date(data.timestamp);
                    // Если сообщение старое (написано не сегодня), тихо удаляем из базы интернета
                    if (msgDate.toDateString() !== now.toDateString()) {
                        db.child(snapshot.key).remove();
                        return true; 
                    }
                }
            }
            return false;
        }

        // Каждому блоку сообщения теперь даем уникальный ID из Firebase (data-id)
        function renderMessage(id, name, text) {
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.setAttribute('data-id', id);
            div.innerHTML = `<b>[${name}]:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Прием сообщений в реальном времени
        db.limitToLast(50).on('child_added', (snapshot) => {
            if (checkAndWipeOldMessages(snapshot)) return;
            const data = snapshot.val();
            if (data) {
                renderMessage(snapshot.key, data.name, data.text);
            }
        });

        // Бронебойное удаление по ID ключа — без ошибок и вылетов
        db.on('child_removed', (snapshot) => {
            const targetLine = chat.querySelector(`[data-id="${snapshot.key}"]`);
            if (targetLine) {
                targetLine.remove();
            }
        });

        // Логика защиты от спама (кд 5 секунд)
        function startCooldown() {
            isCooldown = true;
            sendBtn.disabled = true;
            let timeLeft = 5.0;

            const timer = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    sendBtn.disabled = false;
                    sendBtn.innerText = "ОТПРАВИТЬ";
                    msgInput.placeholder = "Пиши сюда...";
                    isCooldown = false;
                } else {
                    sendBtn.innerText = `[${timeLeft.toFixed(1)}s]`;
                    msgInput.placeholder = "Жди кулдаун...";
                }
            }, 100);
        }

        // Функция отправки сообщений в интернет
        function send() {
            if (isCooldown) return;

            const text = msgInput.value.trim();
            const name = nickInput.value.trim() || 'Анон';
            
            if (text !== '') {
                startCooldown();
                db.push({
                    name: name,
                    text: text,
                    timestamp: Date.now()
                });
                msgInput.value = '';
            }
        }

        msgInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter' && !isCooldown) send(); 
        });
    </script>
</body>
</html>
