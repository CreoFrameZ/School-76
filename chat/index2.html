<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mesh Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        h3 { text-align: center; margin-bottom: 10px; font-size: 16px; letter-spacing: 2px; text-shadow: 0 0 5px #00ff00; }
        #chat { flex: 1; border: 1px solid #00ff00; background: #050505; padding: 15px; overflow-y: auto; margin-bottom: 15px; border-radius: 4px; box-shadow: inset 0 0 10px #003300; }
        .msg-line { margin-bottom: 8px; line-height: 1.4; font-size: 14px; word-break: break-all; }
        .system { color: #888; font-style: italic; }
        .error-msg { color: #ff0000; font-weight: bold; }
        .controls { display: flex; gap: 10px; }
        input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 12px; font-family: inherit; font-size: 14px; border-radius: 4px; outline: none; }
        input:focus { box-shadow: 0 0 5px #00ff00; }
        #nick { width: 80px; text-align: center; }
        #msg { flex: 1; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 20px; font-family: inherit; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #003300; color: #006600; cursor: not-allowed; }
    </style>
</head>
<body>

    <h3>[ ГЛОБАЛЬНЫЙ ПОДПОЛЬНЫЙ ЧАТ ШКОЛЫ №76 ]</h3>
    <div id="chat"></div>
    
    <div class="controls">
        <input id="nick" type="text" value="Анон" maxlength="8">
        <input id="msg" type="text" placeholder="Синхронизация..." disabled autocomplete="off" maxlength="200">
        <button id="send-btn" disabled onclick="send()">ЖДИ...</button>
    </div>

    <!-- Подключение современных модулей Firebase v10 через CDN -->
    <script type="module">
        import { initializeApp } from "gstatic.com";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "gstatic.com";

        // Общая база данных для глобального теста
        const firebaseConfig = {
            databaseURL: "firebasedatabase.app"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'global_messages');

        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        const nickInput = document.getElementById('nick');
        const sendBtn = document.getElementById('send-btn');

        let isCooldown = false;

        chat.innerHTML = '<div class="msg-line system">Подключение к зашифрованному облачному шлюзу...</div>';

        // Разблокировка интерфейса после успешного коннекта
        setTimeout(() => {
            const loader = chat.querySelector('.system');
            if (loader) loader.remove();
            msgInput.placeholder = "Пиши сюда...";
            msgInput.disabled = false;
            sendBtn.disabled = false;
            sendBtn.innerText = "ОТПРАВИТЬ";
        }, 1500);

        // Функция автоматического вайпа по воскресеньям
        function checkAndWipeOldMessages(snapshot) {
            const now = new Date();
            // 0 — это воскресенье
            if (now.getDay() === 0) {
                const data = snapshot.val();
                if (data && data.timestamp) {
                    const msgDate = new Date(data.timestamp);
                    // Если сообщение отправлено НЕ сегодня (на прошлой неделе) — стираем его из глобальной базы у всех
                    if (msgDate.toDateString() !== now.toDateString()) {
                        const itemRef = ref(db, `global_messages/${snapshot.key}`);
                        remove(itemRef);
                        return true; 
                    }
                }
            }
            return false;
        }

        function renderMessage(name, text) {
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.innerHTML = `<b>[${name}]:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Прием сообщений со всех интернетов в реальном времени
        onChildAdded(messagesRef, (snapshot) => {
            if (checkAndWipeOldMessages(snapshot)) return;
            const data = snapshot.val();
            renderMessage(data.name, data.text);
        });

        // Мгновенная очистка экрана у пользователей, когда база вайпается
        onChildRemoved(messagesRef, () => {
            chat.innerHTML = '<div class="msg-line system">История чата очищена по расписанию (Воскресный вайп).</div>';
        });

        // Защита от спама (Кулдаун 2 секунды)
        function startCooldown() {
            isCooldown = true;
            sendBtn.disabled = true;
            let timeLeft = 2.0;

            const timer = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    sendBtn.disabled = false;
                    msgInput.placeholder = "Пиши сюда...";
                    isCooldown = false;
                } else {
                    msgInput.placeholder = `[КД: ${timeLeft.toFixed(1)}s]`;
                }
            }, 100);
        }

        // Функция отправки в облако
        window.send = function() {
            if (isCooldown) return;

            const text = msgInput.value.trim();
            const name = nickInput.value.trim() || 'Анон';
            
            if (text !== '') {
                startCooldown();
                push(messagesRef, {
                    name: name,
                    text: text,
                    timestamp: Date.now() // Метка времени для воскресной проверки
                }).catch(err => {
                    renderMessage('СИСТЕМА', 'Ошибка сети: ' + err.message);
                });
                msgInput.value = '';
            }
        }

        msgInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter' && !isCooldown) send(); 
        });
    </script>
</body>
</html>
