<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mesh Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        h3 { text-align: center; margin-bottom: 10px; font-size: 16px; letter-spacing: 2px; text-shadow: 0 0 5px #00ff00; }
        #chat { flex: 1; border: 1px solid #00ff00; background: #050505; padding: 15px; overflow-y: auto; margin-bottom: 15px; border-radius: 4px; box-shadow: inset 0 0 10px #003300; }
        .msg-line { margin-bottom: 8px; line-height: 1.4; font-size: 14px; word-break: break-all; }
        .system { color: #888; font-style: italic; }
        .controls { display: flex; gap: 10px; }
        input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 12px; font-family: inherit; font-size: 14px; border-radius: 4px; outline: none; }
        input:focus { box-shadow: 0 0 5px #00ff00; }
        #nick { width: 80px; text-align: center; }
        #msg { flex: 1; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 20px; font-family: inherit; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <h3>[ ПОДПОЛЬНЫЙ ЧАТ ШКОЛЫ №76 ]</h3>
    <div id="chat"></div>
    
    <div class="controls">
        <input id="nick" type="text" value="Анон" maxlength="8">
        <input id="msg" type="text" placeholder="Пиши сюда..." autocomplete="off" maxlength="200">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>

    <!-- Подключение стабильных версий Firebase для работы через любой интернет -->
    <script src="gstatic.com"></script>
    <script src="gstatic.com"></script>

    <script>
        // Общий публичный тестовый сервер для связи устройств
        const firebaseConfig = {
            databaseURL: "firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');

        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        const nickInput = document.getElementById('nick');

        chat.innerHTML = '<div class="msg-line system">Синхронизация с узлом сети...</div>';

        // Проверка и удаление старых сообщений (Вайп по воскресеньям)
        function checkAndWipeOldMessages(snapshot) {
            const now = new Date();
            // Если сегодня воскресенье (0)
            if (now.getDay() === 0) {
                const data = snapshot.val();
                if (data && data.timestamp) {
                    const msgDate = new Date(data.timestamp);
                    // Если сообщение было написано НЕ сегодня, удаляем его у всех
                    if (msgDate.toDateString() !== now.toDateString()) {
                        firebase.database().ref('messages/' + snapshot.key).remove();
                        return true; 
                    }
                }
            }
            return false;
        }

        function renderMessage(name, text) {
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.innerHTML = `<b>[${name}]:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Прием сообщений из интернета в реальном времени
        db.limitToLast(50).on('child_added', (snapshot) => {
            if (checkAndWipeOldMessages(snapshot)) return;

            const data = snapshot.val();
            const loader = chat.querySelector('.system');
            if (loader && loader.innerText.includes('Синхронизация')) loader.remove();
            
            renderMessage(data.name, data.text);
        });

        // Отслеживание удаления сообщений (очистка экрана при вайпе)
        db.on('child_removed', () => {
            chat.innerHTML = '';
        });

        function send() {
            const text = msgInput.value.trim();
            const name = nickInput.value.trim() || 'Анон';
            if (text !== '') {
                db.push({
                    name: name,
                    text: text,
                    timestamp: Date.now() // Время отправки для контроля воскресного удаления
                });
                msgInput.value = '';
            }
        }

        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
