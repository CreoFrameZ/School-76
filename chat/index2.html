<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mesh Local Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        h3 { text-align: center; margin-bottom: 10px; font-size: 16px; letter-spacing: 2px; text-shadow: 0 0 5px #00ff00; }
        #chat { flex: 1; border: 1px solid #00ff00; background: #050505; padding: 15px; overflow-y: auto; margin-bottom: 15px; border-radius: 4px; box-shadow: inset 0 0 10px #003300; }
        .msg-line { margin-bottom: 8px; line-height: 1.4; font-size: 14px; word-break: break-all; }
        .system { color: #888; font-style: italic; }
        .controls { display: flex; gap: 10px; }
        input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 12px; font-family: inherit; font-size: 14px; border-radius: 4px; outline: none; }
        input:focus { box-shadow: 0 0 5px #00ff00; }
        #nick { width: 80px; text-align: center; }
        #msg { flex: 1; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 20px; font-family: inherit; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #003300; color: #006600; cursor: not-allowed; }
    </style>
</head>
<body>

    <h3>[ ЛОКАЛЬНЫЙ ШЛЮЗ ШКОЛЫ №76 ]</h3>
    <div id="chat"></div>
    
    <div class="controls">
        <input id="nick" type="text" value="Анон" maxlength="8">
        <input id="msg" type="text" placeholder="Пиши сюда..." autocomplete="off" maxlength="200">
        <button id="send-btn" onclick="send()">ОТПРАВИТЬ</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        const nickInput = document.getElementById('nick');
        const sendBtn = document.getElementById('send-btn');

        let isCooldown = false;

        // Создаем чистый внутренний канал связи браузера
        const channel = new BroadcastChannel('school_76_local_mesh');

        chat.innerHTML = '<div class="msg-line system">> Локальный канал активен. Открой вторую вкладку для теста.</div>';

        function renderMessage(name, text) {
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.innerHTML = `<b>[${name}]:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Принимаем сообщения из соседних вкладок/окон
        channel.onmessage = (event) => {
            if (event.data.isWipeAction) {
                chat.innerHTML = '<div class="msg-line system">История очищена по воскресному расписанию.</div>';
                return;
            }
            renderMessage(event.data.name, event.data.text);
        };

        // Защита от спама на 5 секунд
        function startCooldown() {
            isCooldown = true;
            sendBtn.disabled = true;
            let timeLeft = 5.0;

            const timer = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    sendBtn.disabled = false;
                    sendBtn.innerText = "ОТПРАВИТЬ";
                    msgInput.placeholder = "Пиши сюда...";
                    isCooldown = false;
                } else {
                    sendBtn.innerText = `[${timeLeft.toFixed(1)}s]`;
                    msgInput.placeholder = "Жди кулдаун...";
                }
            }, 100);
        }

        function send() {
            if (isCooldown) return;

            const text = msgInput.value.trim();
            const name = nickInput.value.trim() || 'Анон';
            const now = new Date();

            // Авто-вайп по воскресеньям (0 — это воскресенье)
            if (now.getDay() === 0) {
                startCooldown();
                channel.postMessage({ isWipeAction: true });
                chat.innerHTML = '<div class="msg-line system">История очищена по воскресному расписанию.</div>';
                msgInput.value = '';
                return;
            }
            
            if (text !== '') {
                startCooldown();
                
                // Передаем сообщение в соседние вкладки
                channel.postMessage({ name: name, text: text });
                
                // Отрисовываем у себя
                renderMessage(name, text);
                msgInput.value = '';
            }
        }

        msgInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter' && !isCooldown) send(); 
        });
    </script>
</body>
</html>
